<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='70.7' height='58.6' fill='%237f7f7f'/><path d='M100 100H0V0Z' fill='%23656565'/><circle cx='70.7' cy='29.3' r='29.3' fill='%23aeaeae'/></svg>">
<title>Rollin — a writing surface that rolls</title>
<style>
  :root{
    --paper:      #fcfbf8;
    --ink:        #1f1c17;
    --pen:        #2f4a6b;
    --sel:        rgba(47,74,107,.18);
    --rule:       rgba(31,28,23,.10);
    --serif: "Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,"Times New Roman",serif;
    --mono:  ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --step: 52px;
    --font: 30px;
    --chrome: 1;
    --anchor: 40%;   /* resting line, measured from the top. Fallback only — set from JS (TUNE.anchor). */
  }
  *{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }  /* stop iOS boosting band vs. wrapmirror unevenly */
  html,body{ height:100%; margin:0; }
  body{
    background:var(--paper);
    color:var(--ink); font-family:var(--serif);
    overflow:hidden; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .stage{
    position:fixed; inset:0;
    perspective:1400px; perspective-origin:50% var(--anchor);   /* vantage point tracks the anchor, or the drum skews */
    overflow:hidden; touch-action:none; cursor:text;
  }
  .stage::before{
    content:""; position:absolute; inset:0; pointer-events:none; z-index:3;
    opacity:var(--chrome,1);
    background:linear-gradient(to bottom,
      var(--paper) 0%, rgba(246,245,241,0) 22%,
      rgba(246,245,241,0) 78%, var(--paper) 100%);
  }
  .seam{
    position:absolute; left:50%; top:var(--anchor); z-index:0;
    width:min(92vw,46rem); height:var(--step);
    transform:translate(-50%,-50%); pointer-events:none;
    opacity:var(--chrome,1);
  }
  .seam::after{
    content:""; position:absolute; left:0; right:0; bottom:-1px; height:1px;
    background:linear-gradient(to right, transparent, var(--rule) 20%, var(--rule) 80%, transparent);
  }
  .col{
    position:absolute; left:50%; top:0; bottom:0;
    width:min(92vw,46rem);
    transform:translateX(-50%); transform-style:preserve-3d;
    pointer-events:none; user-select:none; z-index:1;
  }
  .band, .wrapmirror, .xmirror{
    font-size:var(--font);
    line-height:var(--step);
    letter-spacing:.004em;
    word-break:break-word;
  }
  .band, .wrapmirror{ white-space:pre-wrap; }
  .band{
    position:absolute; left:0; right:0; top:var(--anchor);
    transform-origin:50% 50%;
    text-align:left; min-height:var(--step);
    pointer-events:auto; user-select:none; will-change:transform,opacity;
  }
  .hl{ position:absolute; top:0; height:var(--step); background:var(--sel); border-radius:1.5px; pointer-events:none; }
  .ink{ position:relative; }
  .caret{
    display:inline-block; width:0; height:1em; margin:0 0 -0.12em 0;
    box-shadow:0 0 0 1px var(--pen); vertical-align:baseline;
    visibility:hidden;                 /* only shown while the writing surface is focused */
  }
  .focused .caret{ visibility:visible; animation:blink 1.15s steps(1,end) infinite; }
  @keyframes blink{ 0%,52%{opacity:1} 53%,100%{opacity:0} }
  .input{
    position:absolute; inset:0; z-index:2;
    width:100%; height:100%; margin:0; padding:0; border:0; outline:0; resize:none;
    background:transparent; font:inherit;
    opacity:0;                    /* renders nothing — text, caret, selection all hidden — but still focusable */
    pointer-events:none;
  }
  .wrapmirror, .xmirror{
    position:absolute; left:-99999px; top:0; visibility:hidden; pointer-events:none; text-align:left;
  }
  .xmirror{ white-space:pre; }
  .mark{
    position:fixed; left:24px; top:22px; z-index:4; width: 20px;
  }
  .count{
    position:fixed; left:0; right:0; bottom:22px; z-index:4; text-align:center;
    font-family:var(--mono); font-size:11px; letter-spacing:.22em; color:var(--ink); opacity:.30; pointer-events:none;
  }
  .ghost{
    position:absolute; left:50%; top:var(--anchor); z-index:0; transform:translate(-50%,-50%);
    width:min(92vw,46rem); font-size:var(--font); line-height:var(--step);
    color:var(--ink); opacity:.26; pointer-events:none; font-style:italic; transition:opacity .15s ease;
  }
  @media (prefers-reduced-motion: reduce){ .focused .caret{ animation:none; } }

  /* ---- settings ---- */
  .topbar{
    position:fixed; right:22px; top:20px; z-index:7;
    display:flex; gap:20px; align-items:center;
  }
  .gear, .toggle{
    font-family:var(--mono); font-size:11px; letter-spacing:.28em; text-transform:uppercase;
    color:var(--ink); opacity:.4; background:none; border:0; cursor:pointer; padding:6px 2px;
  }
  .gear:hover, .toggle:hover{ opacity:.72; }
  .panel{
    position:fixed; top:0; right:0; height:100%; width:280px; max-width:82vw; z-index:6;
    background:var(--paper);
    transform:translateX(100%); transition:transform .34s cubic-bezier(.22,.61,.36,1);
    padding:60px 26px 28px; overflow-y:auto;
    font-family:var(--mono); color:var(--ink);
  }
  .panel.open{
    transform:none;
    box-shadow:-1px 0 0 var(--rule), -22px 0 46px rgba(31,28,23,.07);
  }
  .panel h2{
    font-size:11px; letter-spacing:.28em; text-transform:uppercase; opacity:.5;
    margin:0 0 24px; font-weight:normal;
  }
  .field{ margin-bottom:24px; }
  .field label{
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:11px; letter-spacing:.12em; text-transform:uppercase; opacity:.55; margin-bottom:10px;
  }
  .field .v{ opacity:.95; letter-spacing:.04em; font-variant-numeric:tabular-nums; }
  .field input[type=range]{
    -webkit-appearance:none; appearance:none; width:100%; height:2px;
    background:var(--rule); border-radius:2px; outline:none; cursor:pointer;
  }
  .field input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none; width:14px; height:14px; border-radius:50%;
    background:var(--pen); cursor:pointer;
  }
  .field input[type=range]::-moz-range-thumb{
    width:14px; height:14px; border:0; border-radius:50%; background:var(--pen); cursor:pointer;
  }
  .reset{
    margin-top:6px; font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--pen); background:none; border:0; cursor:pointer; padding:8px 0; opacity:.85;
  }
  .reset:hover{ opacity:1; }
</style>
</head>
<body>
  <div class="mark">
    <svg role="img" viewBox="0 0 100 100">
      <rect width="70.7" height="58.6" fill="#7f7f7f"/>
      <path d="M100 100H0V0Z" fill="#656565"/>
      <circle cx="70.7" cy="29.3" r="29.3" fill="#aeaeae"/>
    </svg>
  </div>
  <div class="stage" id="stage">
    <div class="seam"></div>
    <div class="ghost" id="ghost">start typing</div>
    <div class="col" id="col"></div>
    <textarea class="input" id="input"
      autocomplete="off"
      spellcheck="false"
      autocapitalize="sentences"
      aria-label="Writing surface. Arrows move by visible line; drag to select; wheel to look back."></textarea>
  </div>
  <div class="count" id="count"></div>

  <div class="topbar">
    <button class="toggle" id="roll" aria-label="Toggle flat mode">unroll</button>
    <button class="gear" id="gear" aria-label="Open settings">settings</button>
  </div>
  <aside class="panel" id="panel" aria-label="Settings">
    <h2>settings</h2>
    <div class="field">
      <label>curvature <span class="v" id="v-size"></span></label>
      <input type="range" id="s-size" step="1">
    </div>
    <div class="field">
      <label>lines visible <span class="v" id="v-lines"></span></label>
      <input type="range" id="s-lines" step="1">
    </div>
    <div class="field">
      <label>blur <span class="v" id="v-blur"></span></label>
      <input type="range" id="s-blur" step="1">
    </div>
    <div class="field">
      <label>font size <span class="v" id="v-font"></span></label>
      <input type="range" id="s-font" step="1">
    </div>
    <button class="reset" id="reset">reset to defaults</button>
  </aside>

<script>
(() => {
  const stage = document.getElementById('stage');
  const col   = document.getElementById('col');
  const ta    = document.getElementById('input');
  const ghost = document.getElementById('ghost');
  const count = document.getElementById('count');

  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const TUNE = {
    ease:       0.2,    // scroll / morph easing per frame
    busyEase:   1.6,    // ease multiplier while edge-auto-scrolling a selection
    scrollSens: 0.7,    // trackpad wheel delta → lines
    autoScroll: 0.6,    // edge auto-scroll speed (lines / frame)
    snapDelay:  130,    // ms of stillness before a trackpad scroll snaps to a line
    wheelMouse: 40,     // |deltaY| at/above which a wheel event counts as a mouse notch
    dragMouse:  3,      // px before a mouse press becomes a drag-select
    dragTouch:  6,      // px before a touch press becomes a scroll
    edgeZone:   0.18,   // top/bottom screen fraction that triggers select auto-scroll
    opacityExp: 1.8,    // how sharply lines fade toward the horizon
    wrapDetect: 0.5,    // fraction of line pitch a vertical jump must exceed to count as a wrap
    fontRatio:  1.72,   // line pitch ÷ font size
    scrolloff:  1,      // lines kept from the edge before unroll scrolls
    anchor:     0.4,   // resting line's height from the top of the viewport (60% up from the bottom),
                        // lifted off center so a mobile keyboard doesn't cover the line being written
  };
  const EASE = reduced ? 1 : TUNE.ease;
  const clamp = (v,a,b) => v < a ? a : v > b ? b : v;
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let STEP, R, WINDOW;
  const pool = new Map();

  // two offscreen twins: one to find wrap points, one to measure x within a single row
  const wrap = document.createElement('div'); wrap.className = 'wrapmirror'; document.body.appendChild(wrap);
  const xm   = document.createElement('div'); xm.className   = 'xmirror';    document.body.appendChild(xm);

  // text state
  let val = '', caretRow = 0, caretOff = 0;
  let rows = [{start:0, end:0}];
  let cacheVal = null, cacheWidth = 0;

  // animation state
  let center = 0, target = 0, mode = 'write', running = false;
  let flatAmt = 0, flatTarget = 0;           // 0 = rolled (curved), 1 = unrolled (flat); both center-anchored

  // interaction state
  let vRun = false, goalX = 0;              // vertical-arrow goal column
  let selAnchor = 0;                         // mouse-selection anchor
  let lastX = 0, lastY = 0, autoDir = 0;     // edge auto-scroll while selecting
  let endAffinity = false;                   // at a wrap boundary, show the caret at the line that ends there

  // ---- settings ----
  const screenFont = Math.round(Math.max(40, Math.min(56, Math.min(window.innerWidth, window.innerHeight*1.3)/15)) * 0.58);
  const OPTS = {
    size:  [6, 9, 14, 22, 34],                // radius as a multiple of line pitch — the curvature control
    lines: [2, 3, 4, 5, 6, 8, 10, 12],        // how many lines show before a line fully fades
    blur:  [0, 2, 5],
    font:  [20, 24, 28, 32, 38, 44],
  };
  const fmt  = { size:v=>v+'×', lines:v=>''+v, blur:v=>(+v).toFixed(0), font:v=>v+'px' };
  WINDOW = Math.max(...OPTS.lines) + 1;          // always render at least the most lines-visible can show
  const KEYS = ['size','lines','blur','font'];
  const nearest = (arr, x) => arr.reduce((a, b) => Math.abs(b - x) < Math.abs(a - x) ? b : a, arr[0]);
  const DEFAULTS = { size:14, lines:6, blur:2, font: nearest(OPTS.font, screenFont), flat:false };
  function loadSettings(){ try{ const s = JSON.parse(localStorage.getItem('rollin.settings')); if(s && typeof s === 'object') return s; }catch(_){} return {}; }
  function saveSettings(){ try{ localStorage.setItem('rollin.settings', JSON.stringify(settings)); }catch(_){} }
  let settings = Object.assign({}, DEFAULTS, loadSettings());
  for(const k of KEYS){ if(!OPTS[k].includes(settings[k])) settings[k] = nearest(OPTS[k], settings[k]); }  // sanitize

  let cosMax = 1;
  function recomputeFade(){                     // N lines across the drum → fade completes at N/size radians
    cosMax = Math.cos(settings.lines / settings.size);
  }
  function applyFont(){
    STEP = Math.round(settings.font * TUNE.fontRatio);     // line pitch scales with the type size
    R    = STEP * settings.size;                 // radius scales with the cylinder-size knob
    document.documentElement.style.setProperty('--step', STEP + 'px');
    document.documentElement.style.setProperty('--font', settings.font + 'px');
    document.documentElement.style.setProperty('--anchor', (TUNE.anchor * 100) + '%');
    const fs = settings.font + 'px';
    wrap.style.fontSize = fs; wrap.style.lineHeight = STEP + 'px';
    xm.style.fontSize   = fs; xm.style.lineHeight   = STEP + 'px';
  }
  // the anchor splits the viewport unevenly, so the room a row has differs above vs below it
  const spaceAbove = () => window.innerHeight * TUNE.anchor;
  const spaceBelow = () => window.innerHeight * (1 - TUNE.anchor);

  // ---- shared primitive: measure text geometry per row ----
  function segment(text){
    wrap.style.width = col.clientWidth + 'px';
    if(text.length === 0) return [{start:0, end:0}];
    wrap.textContent = text;
    const node = wrap.firstChild, range = document.createRange();
    const out = []; let rowStart = 0, curTop = null;
    for(let i=0;i<text.length;i++){
      if(text[i] === '\n'){ out.push({start:rowStart, end:i}); rowStart = i+1; curTop = null; continue; }
      range.setStart(node, i); range.setEnd(node, i+1);
      // A range starting at a line boundary is ambiguous, and WebKit resolves it to the end of the
      // *previous* line: getClientRects() then holds a zero-width rect there plus the character's
      // real one, and getBoundingClientRect() unions them, reporting the previous line's top. That
      // seeds curTop a full STEP too high after a hard newline, so char two looks like a wrap.
      // Take the character's own box; a rect with no width is a position, not a glyph.
      const rects = range.getClientRects();
      let rect = null;
      for(let j=rects.length-1;j>=0;j--){ if(rects[j].width > 0 && rects[j].height > 0){ rect = rects[j]; break; } }
      if(!rect) continue;                      // whitespace swallowed at a wrap point has no box
      const top = rect.top;
      if(curTop === null){ curTop = top; }
      else if(top - curTop > STEP * TUNE.wrapDetect){ out.push({start:rowStart, end:i}); rowStart = i; curTop = top; }
    }
    out.push({start:rowStart, end:text.length});
    return out;
  }
  function xWidth(i, k){                       // x of caret at offset k within row i
    xm.textContent = val.slice(rows[i].start, rows[i].start + k);
    return xm.getBoundingClientRect().width;
  }
  function offsetAtX(i, x){                     // nearest offset within row i to pixel x
    const len = rows[i].end - rows[i].start;
    let lo = 0, hi = len;
    while(lo < hi){ const mid = (lo+hi+1)>>1; if(xWidth(i, mid) <= x) lo = mid; else hi = mid-1; }
    if(lo < len && Math.abs(xWidth(i, lo+1) - x) < Math.abs(x - xWidth(i, lo))) return lo+1;
    return lo;
  }
  function rowOf(pos, endAff){
    let r = 0;
    for(let i=0;i<rows.length;i++){ if(rows[i].start <= pos && pos <= rows[i].end) r = i; }
    if(endAff && r > 0 && rows[r].start === pos && rows[r-1].end === pos) r--;   // soft-wrap boundary → the line ending here
    return r;
  }
  function affinityFor(pos, row){                 // caret placed on `row` → end-affinity iff pos is that row's wrap seam
    return row + 1 < rows.length && rows[row].end === pos && rows[row + 1].start === pos;
  }

  // ---- rendering ----
  function fill(i){
    const el = pool.get(i); if(!el) return;
    if(i < 0 || i > rows.length - 1){ el.innerHTML = ''; return; }
    const rs = rows[i].start, re = rows[i].end;
    const text = val.slice(rs, re);
    const a = Math.min(ta.selectionStart, ta.selectionEnd);
    const b = Math.max(ta.selectionStart, ta.selectionEnd);
    let hl = '';
    if(b > a && b > rs && a <= re){
      const s1 = Math.max(a, rs), s2 = Math.min(b, re), through = b > re;
      if(s2 > s1 || through){
        const x1 = xWidth(i, Math.max(0, s1 - rs));
        let x2 = through ? xWidth(i, re - rs) + STEP*0.30 : xWidth(i, Math.max(0, s2 - rs));
        if(x2 > x1) hl = `<div class="hl" style="left:${x1.toFixed(1)}px;width:${(x2-x1).toFixed(1)}px"></div>`;
      }
    }
    const inner = (i === caretRow)
      ? esc(text.slice(0, caretOff)) + '<span class="caret"></span>' + esc(text.slice(caretOff))
      : esc(text);
    el.innerHTML = hl + '<span class="ink">' + inner + '</span>';
  }
  function getBand(i){
    let el = pool.get(i);
    if(!el){ el = document.createElement('div'); el.className='band'; el._row=i; col.appendChild(el); pool.set(i,el); fill(i); }
    return el;
  }
  function place(el, i){
    const f = flatAmt;
    const s = i - center;                                       // curved contribution
    const a = s * (STEP / R), c = Math.cos(a);
    const yC = R * Math.sin(a), zC = R * c - R, rxC = -a * (180/Math.PI);
    const tC = Math.max(0, (c - cosMax) / (1 - cosMax));
    const opC = Math.pow(tC, TUNE.opacityExp);
    const blurC = Math.abs(s) < 0.001 ? 0 : (1 - tC) * settings.blur;
    const yF = s * STEP;                                        // flat: linear stack, centered on the same row
    const y  = yC + (yF - yC) * f;                              // blend
    const z  = zC * (1 - f);
    const rx = rxC * (1 - f);
    const op = opC + (1 - opC) * f;
    const blur = blurC * (1 - f);
    el.style.transform  = `translateY(calc(-50% + ${y.toFixed(2)}px)) translateZ(${z.toFixed(2)}px) rotateX(${rx.toFixed(2)}deg)`;
    el.style.opacity    = op.toFixed(3);
    el.style.filter     = blur < 0.02 ? 'none' : `blur(${blur.toFixed(2)}px)`;
    el.style.zIndex     = String(60 - Math.round(Math.abs(s)));
    el.style.visibility = op > 0.004 ? 'visible' : 'hidden';
  }
  function draw(){
    let win = WINDOW;
    if(flatTarget === 1 || flatAmt > 0.001){                    // flat fills the viewport around center
      win = Math.max(WINDOW, Math.ceil(Math.max(spaceAbove(), spaceBelow()) / STEP) + 2);   // cover the longer side
    }
    const c0 = Math.round(center);
    const lo = Math.max(0, c0 - win), hi = Math.min(rows.length - 1, c0 + win);
    for(let i=lo;i<=hi;i++) place(getBand(i), i);
    for(const [i, el] of pool){ if(i < lo || i > hi){ el.remove(); pool.delete(i); } }
    document.documentElement.style.setProperty('--chrome', (1 - flatAmt).toFixed(3));
  }
  function refillVisible(){ setCaretFromFocus(); for(const [i] of pool) fill(i); }

  // ---- animation loop; edge auto-scroll folds in here ----
  function tick(){
    const busy = mode === 'select' && autoDir !== 0;
    if(busy) target = clamp(target + autoDir*TUNE.autoScroll, 0, Math.max(0, rows.length - 1));
    const dC = target - center, dF = flatTarget - flatAmt;
    if(Math.abs(dC) < 0.0006 && Math.abs(dF) < 0.0006 && !busy){
      center = target; flatAmt = flatTarget; draw(); running = false; return;
    }
    center  += dC * (busy ? Math.min(EASE*TUNE.busyEase, 1) : EASE);
    flatAmt += dF * EASE;
    draw();
    if(busy){ const hit = offsetAtPoint(lastX, lastY); if(hit){ placeCaret(hit.pos, hit.row, selAnchor); refillVisible(); } }
    requestAnimationFrame(tick);
  }
  function kick(){ if(!running){ running = true; requestAnimationFrame(tick); } }

  // ---- caret / selection helpers ----
  function curFocus(){ return ta.selectionDirection === 'backward' ? ta.selectionStart : ta.selectionEnd; }
  function curAnchor(){ return ta.selectionDirection === 'backward' ? ta.selectionEnd : ta.selectionStart; }
  function setSel(anchor, focus){
    const s = Math.min(anchor, focus), e = Math.max(anchor, focus);
    ta.setSelectionRange(s, e, focus < anchor ? 'backward' : 'forward');
  }
  function placeCaret(pos, row, anchor){          // set caret at pos (or extend to anchor) + its wrap affinity
    endAffinity = row == null ? false : affinityFor(pos, row);
    setSel(anchor == null ? pos : anchor, pos);
  }
  function setCaretFromFocus(){ const p = curFocus(); caretRow = rowOf(p, endAffinity); caretOff = p - rows[caretRow].start; }

  // recompute everything; write mode aims the drum at the caret
  function layout(){
    val = ta.value;
    const width = col.clientWidth;
    if(val !== cacheVal || width !== cacheWidth){ rows = segment(val); cacheVal = val; cacheWidth = width; }
    setCaretFromFocus();
    const maxRow = Math.max(0, rows.length - 1);
    target = clamp(target, 0, maxRow); center = clamp(center, 0, maxRow);
    if(mode === 'write'){                                       // follow the caret only when it leaves the band
      const visLines = Math.floor(2 * Math.min(spaceAbove(), spaceBelow()) / STEP);   // the caret roams symmetrically, so the shorter side bounds it
      const margin = flatTarget === 1 ? Math.max(1, Math.floor(visLines / 2) - TUNE.scrolloff) : 0;
      if(caretRow - target > margin) target = clamp(caretRow - margin, 0, maxRow);
      else if(target - caretRow > margin) target = clamp(caretRow + margin, 0, maxRow);
    }
    for(const [i] of pool) fill(i);
    ghost.style.opacity = val === '' ? '' : '0';
    const w = val.trim() ? val.trim().split(/\s+/).length : 0;
    count.textContent = w ? (w === 1 ? '1 word' : w + ' words') : '';
    kick();
  }

  // ---- point → character offset ----
  function hitOffset(x, y){
    let node = null, off = 0;
    if(document.caretPositionFromPoint){ const cp = document.caretPositionFromPoint(x, y); if(cp){ node = cp.offsetNode; off = cp.offset; } }
    if(!node && document.caretRangeFromPoint){ const r = document.caretRangeFromPoint(x, y); if(r){ node = r.startContainer; off = r.startOffset; } }
    if(!node) return null;
    let band = node.nodeType === 3 ? node.parentElement : node;
    while(band && !(band.classList && band.classList.contains('band'))) band = band.parentElement;
    if(!band || band._row == null || band._row > rows.length - 1) return null;
    const range = document.createRange(); range.selectNodeContents(band);
    try { range.setEnd(node, off); } catch(e){ return null; }
    const rowLen = rows[band._row].end - rows[band._row].start;
    return { pos: rows[band._row].start + Math.min(range.toString().length, rowLen), row: band._row };
  }
  function offsetAtPoint(x, y){
    const h = hitOffset(x, y); if(h) return h;
    let best = null, bd = Infinity;                     // fallback: nearest visible row, then x
    for(const [i, el] of pool){
      if(el.style.visibility === 'hidden') continue;
      const r = el.getBoundingClientRect(), cy = r.top + r.height/2, d = Math.abs(cy - y);
      if(d < bd){ bd = d; best = i; }
    }
    if(best == null) return null;
    return { pos: rows[best].start + offsetAtX(best, x - col.getBoundingClientRect().left), row: best };
  }

  // ---- vertical arrows + Home/End across visible rows ----
  function verticalMove(dir, extend){
    const focus = curFocus(), anchor = extend ? curAnchor() : focus;
    const r = rowOf(focus, endAffinity), nr = clamp(r + dir, 0, rows.length - 1);
    if(nr === r){                                        // top/bottom edge → jump to line start/end
      const nf = dir < 0 ? rows[r].start : rows[r].end;
      placeCaret(nf, r, extend ? anchor : undefined); mode = 'write'; layout(); return;
    }
    if(!vRun){ goalX = xWidth(r, focus - rows[r].start); vRun = true; }
    const nf = rows[nr].start + offsetAtX(nr, goalX);
    placeCaret(nf, nr, extend ? anchor : undefined); mode = 'write'; layout();
  }
  function homeEnd(which, extend){
    const focus = curFocus(), r = rowOf(focus, endAffinity);   // the caret's current visual line
    const nf = which === 'home' ? rows[r].start : rows[r].end;
    placeCaret(nf, r, extend ? curAnchor() : undefined); vRun = false; mode = 'write'; layout();
  }

  ta.addEventListener('keydown', e => {
    const k = e.key;
    if(k === 'ArrowUp' || k === 'ArrowDown'){ e.preventDefault(); verticalMove(k === 'ArrowUp' ? -1 : 1, e.shiftKey); return; }
    if(k === 'Home' || k === 'End'){ e.preventDefault(); homeEnd(k === 'Home' ? 'home' : 'end', e.shiftKey); return; }
    vRun = false; mode = 'write'; endAffinity = false;   // any other key: horizontal/typing, tracked natively
  });
  document.addEventListener('selectionchange', () => { if(document.activeElement === ta) layout(); });
  ta.addEventListener('input', () => {
    mode = 'write'; endAffinity = false; layout();
  });
  ta.addEventListener('scroll', () => { ta.scrollTop = 0; ta.scrollLeft = 0; });
  ta.addEventListener('focus', () => stage.classList.add('focused'));
  ta.addEventListener('blur',  () => stage.classList.remove('focused'));

  // ---- pointer: mouse drags select, touch drags scroll, tap places caret ----
  // iOS dismisses the keyboard without blurring, so the textarea stays activeElement and a plain
  // focus() is a no-op — the keyboard can never be raised again. Force a real focus transition.
  function focusInput(){
    if(document.activeElement === ta) ta.blur();
    ta.focus();
  }
  // Synthesized mousedown after a tap moves focus off the (pointer-events:none) textarea — the
  // same load-bearing preventDefault the mouse path needs, for the compat events touch generates.
  // Safe to blanket: .topbar and .panel live outside .stage, so no control is affected.
  stage.addEventListener('mousedown', e => e.preventDefault());
  let drag = null;
  const edgeTop = () => window.innerHeight * TUNE.edgeZone, edgeBottom = () => window.innerHeight * (1 - TUNE.edgeZone);
  stage.addEventListener('pointerdown', e => {
    vRun = false; endAffinity = false;
    if(e.pointerType === 'touch'){
      drag = { kind:'touch', x:e.clientX, y:e.clientY, startScroll: target, moved:false, id:e.pointerId };
    } else {
      e.preventDefault();                    // stop the default from blurring the textarea
      const hit = offsetAtPoint(e.clientX, e.clientY);
      selAnchor = hit ? hit.pos : ta.value.length;
      drag = { kind:'mouse', x:e.clientX, y:e.clientY, moved:false, id:e.pointerId };
      ta.focus(); placeCaret(selAnchor, hit ? hit.row : null); refillVisible();
      // capture only for mouse drag-select; capturing a touch pointer suppresses WebKit's
      // synthesized click/focus flow, which the tap-to-focus path depends on
      if(stage.setPointerCapture) try { stage.setPointerCapture(e.pointerId); } catch(_){}
    }
  });
  stage.addEventListener('pointermove', e => {
    if(!drag || e.pointerId !== drag.id) return;
    if(drag.kind === 'touch'){
      const dy = e.clientY - drag.y;
      if(!drag.moved && Math.hypot(e.clientX - drag.x, dy) > TUNE.dragTouch) drag.moved = true;
      if(drag.moved){ mode = 'scroll'; target = clamp(drag.startScroll - dy/STEP, 0, Math.max(0, rows.length-1)); kick(); e.preventDefault(); }
      return;
    }
    if(!drag.moved && Math.hypot(e.clientX - drag.x, e.clientY - drag.y) <= TUNE.dragMouse) return;
    drag.moved = true; mode = 'select';
    lastX = e.clientX; lastY = e.clientY;
    autoDir = e.clientY < edgeTop() ? -1 : e.clientY > edgeBottom() ? 1 : 0;
    const hit = offsetAtPoint(e.clientX, e.clientY);
    if(hit){ placeCaret(hit.pos, hit.row, selAnchor); refillVisible(); }
    if(autoDir !== 0) kick();
    e.preventDefault();
  });
  stage.addEventListener('pointerup', e => {
    if(!drag || e.pointerId !== drag.id){ drag = null; return; }
    autoDir = 0;
    if(drag.kind === 'mouse'){
      if(!drag.moved){ mode = 'write'; layout(); }   // a click → recenter to the caret
      else { mode = 'select'; refillVisible(); }
    } else if(!drag.moved){                            // a tap → place caret, open the keyboard
      if(e.cancelable) e.preventDefault();             // suppress the compat mouse events that steal focus
      const hit = offsetAtPoint(e.clientX, e.clientY);
      selAnchor = hit ? hit.pos : ta.value.length;
      mode = 'write'; focusInput(); placeCaret(selAnchor, hit ? hit.row : null); layout();
    } else {                                         // a touch scroll → settle on a line
      target = clamp(Math.round(target), 0, Math.max(0, rows.length - 1)); kick();
    }
    drag = null;
  });
  stage.addEventListener('pointercancel', () => { autoDir = 0; drag = null; });

  // ---- wheel / trackpad: look back without moving the caret ----
  let snapTimer = null;
  function scheduleSnap(){                        // settle on a line once a continuous scroll stops
    clearTimeout(snapTimer);
    snapTimer = setTimeout(() => {
      if(mode === 'scroll'){ target = clamp(Math.round(target), 0, Math.max(0, rows.length - 1)); kick(); }
    }, TUNE.snapDelay);
  }
  stage.addEventListener('wheel', e => {
    e.preventDefault(); mode = 'scroll';
    const max = Math.max(0, rows.length - 1);
    const mouse = e.deltaMode !== 0 || Math.abs(e.deltaY) >= TUNE.wheelMouse;
    if(mouse){                                    // a notchy mouse wheel → one line per notch
      target = clamp(Math.round(target) + Math.sign(e.deltaY), 0, max);
      clearTimeout(snapTimer);
    } else {                                      // trackpad → glide, then snap at the end
      const px = e.deltaMode === 1 ? e.deltaY * STEP : e.deltaMode === 2 ? e.deltaY * STEP * 10 : e.deltaY;
      target = clamp(target + px / STEP * TUNE.scrollSens, 0, max);
      scheduleSnap();
    }
    kick();
  }, { passive:false });

  window.addEventListener('resize', () => { applyFont(); cacheVal = null; layout(); });

  // ---- settings panel wiring ----
  const panel = document.getElementById('panel'), gear = document.getElementById('gear');
  gear.addEventListener('click', () => {
    const open = panel.classList.toggle('open');
    gear.textContent = open ? 'close' : 'settings';
    if(!open) ta.focus();
  });
  function applyOne(k){
    if(k === 'size'){ applyFont(); recomputeFade(); draw(); }   // radius changed
    else if(k === 'lines'){ recomputeFade(); draw(); }          // fade angle re-derived
    else if(k === 'blur'){ draw(); }
    else if(k === 'font'){ applyFont(); recomputeFade(); cacheVal = null; layout(); }
  }
  function syncUI(){
    for(const k of KEYS){
      const s = document.getElementById('s-' + k);
      s.min = 0; s.max = OPTS[k].length - 1; s.step = 1;
      s.value = Math.max(0, OPTS[k].indexOf(settings[k]));
      document.getElementById('v-' + k).textContent = fmt[k](settings[k]);
    }
  }
  KEYS.forEach(k => {
    const s = document.getElementById('s-' + k);
    s.addEventListener('input', () => {                       // live, snaps between curated options
      settings[k] = OPTS[k][parseInt(s.value, 10)];
      document.getElementById('v-' + k).textContent = fmt[k](settings[k]);
      applyOne(k); saveSettings();
    });
    s.addEventListener('change', () => ta.focus());           // hand focus back so you can type & test
  });
  // ---- roll / unroll toggle ----
  const rollBtn = document.getElementById('roll');
  function setRoll(flat){
    flatTarget = flat ? 1 : 0;
    settings.flat = flat; saveSettings();
    rollBtn.textContent = flat ? 'roll' : 'unroll';
    if(!flat){ mode = 'write'; layout(); }       // rolling back up recenters on the caret
    kick(); ta.focus();
  }
  rollBtn.addEventListener('click', () => setRoll(flatTarget === 0));

  document.getElementById('reset').addEventListener('click', () => {
    settings = Object.assign({}, DEFAULTS);
    syncUI();
    flatTarget = 0; rollBtn.textContent = 'unroll';
    recomputeFade(); applyFont(); cacheVal = null; layout(); saveSettings(); kick(); ta.focus();
  });

  // ---- init ----
  recomputeFade(); applyFont(); syncUI();
  flatAmt = flatTarget = settings.flat ? 1 : 0;
  rollBtn.textContent = settings.flat ? 'roll' : 'unroll';
  layout(); draw(); ta.focus();
})();
</script>
</body>
</html>
